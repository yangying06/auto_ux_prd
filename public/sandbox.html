<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype Sandbox</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05070d;
      }

      #viewport {
        display: flex;
        width: 100vw;
        height: 100vh;
        align-items: flex-start;
        justify-content: center;
        overflow: hidden;
      }

      #canvas {
        flex: 0 0 auto;
        width: 375px;
        height: 100vh;
        overflow: hidden;
        transform-origin: top center;
      }

      #preview {
        display: block;
        width: 375px;
        height: 100vh;
        border: 0;
        overflow: auto;
        background: #05070d;
      }
    </style>
  </head>
  <body>
    <div id="viewport">
      <div id="canvas">
        <iframe id="preview" title="Prototype content" sandbox="allow-scripts"></iframe>
      </div>
    </div>
    <script>
      const DESIGN_WIDTH = 375;
      const viewport = document.getElementById('viewport');
      const canvas = document.getElementById('canvas');
      const preview = document.getElementById('preview');
      const DESIGN_HEIGHT = 812;
      let previewMode = 'viewport';
      let contentWidth = DESIGN_WIDTH;
      let contentHeight = DESIGN_HEIGHT;

      function withSizeReporter(html) {
        const reporter = `<script>
          (() => {
            const report = () => {
              const root = document.documentElement;
              const body = document.body;
              parent.postMessage({
                action: 'prototype-size',
                width: Math.max(root.scrollWidth, body ? body.scrollWidth : 0, root.clientWidth),
                height: Math.max(root.scrollHeight, body ? body.scrollHeight : 0, root.clientHeight)
              }, '*');
            };
            window.addEventListener('load', report);
            window.addEventListener('resize', report);
            requestAnimationFrame(report);
            setTimeout(report, 120);
            setTimeout(report, 500);
          })();
        <\/script>`;
        if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, `${reporter}</body>`);
        return `${html}${reporter}`;
      }

      function resizeCanvas() {
        const isFixedAspect = previewMode === 'aspect' || previewMode === 'thumbnail';
        const isFullPage = previewMode === 'full-page';
        const isActual = previewMode === 'actual';
        const targetWidth = isFullPage
          ? Math.max(DESIGN_WIDTH, contentWidth)
          : DESIGN_WIDTH;
        const targetHeight = isFixedAspect
          ? DESIGN_HEIGHT
          : isFullPage || isActual
            ? Math.max(DESIGN_HEIGHT, contentHeight)
            : Math.max(1, window.innerHeight / Math.max(0.01, Math.min(1, window.innerWidth / DESIGN_WIDTH)));
        const scale = isActual
          ? 1
          : isFixedAspect || isFullPage
            ? Math.max(0.01, Math.min(window.innerWidth / targetWidth, window.innerHeight / targetHeight))
            : Math.max(0.01, Math.min(1, window.innerWidth / DESIGN_WIDTH));

        viewport.style.overflow = isActual ? 'auto' : 'hidden';
        canvas.style.width = `${targetWidth}px`;
        canvas.style.height = `${targetHeight}px`;
        canvas.style.transform = `scale(${scale})`;
        preview.style.width = `${targetWidth}px`;
        preview.style.height = `${targetHeight}px`;
        preview.style.overflow = isFullPage ? 'hidden' : 'auto';
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      window.addEventListener('message', (event) => {
        const data = event.data;
        if (!data) return;
        if (data.action === 'prototype-size' && event.source === preview.contentWindow) {
          contentWidth = Number.isFinite(data.width) ? data.width : DESIGN_WIDTH;
          contentHeight = Number.isFinite(data.height) ? data.height : DESIGN_HEIGHT;
          resizeCanvas();
          return;
        }
        if (data.action !== 'hydrate' || typeof data.html !== 'string') return;
        previewMode = ['aspect', 'thumbnail', 'full-page', 'actual'].includes(data.mode) ? data.mode : 'viewport';
        contentWidth = DESIGN_WIDTH;
        contentHeight = DESIGN_HEIGHT;
        resizeCanvas();
        preview.srcdoc = withSizeReporter(data.html);
      });
    </script>
  </body>
</html>
