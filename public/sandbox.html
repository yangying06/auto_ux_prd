<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype Sandbox</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05070d;
      }

      #preview {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #05070d;
      }
    </style>
  </head>
  <body>
    <iframe id="preview" title="Prototype content" sandbox="allow-scripts"></iframe>
    <script>
      const preview = document.getElementById('preview');

      window.addEventListener('message', (event) => {
        const data = event.data;
        if (!data || data.action !== 'hydrate' || typeof data.html !== 'string') return;
        preview.srcdoc = data.html;
      });
    </script>
  </body>
</html>
