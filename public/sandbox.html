<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype Sandbox</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05070d;
      }

      #viewport {
        display: flex;
        width: 100vw;
        height: 100vh;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      #canvas {
        width: 375px;
        height: 812px;
        overflow: hidden;
        transform-origin: center center;
      }

      #preview {
        display: block;
        width: 375px;
        height: 812px;
        border: 0;
        overflow: hidden;
        background: #05070d;
      }
    </style>
  </head>
  <body>
    <div id="viewport">
      <div id="canvas">
        <iframe id="preview" title="Prototype content" sandbox="allow-scripts"></iframe>
      </div>
    </div>
    <script>
      const DESIGN_WIDTH = 375;
      const DESIGN_HEIGHT = 812;
      const canvas = document.getElementById('canvas');
      const preview = document.getElementById('preview');

      function resizeCanvas() {
        const scale = Math.max(0.01, Math.min(window.innerWidth / DESIGN_WIDTH, window.innerHeight / DESIGN_HEIGHT));
        canvas.style.transform = `scale(${scale})`;
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      window.addEventListener('message', (event) => {
        const data = event.data;
        if (!data || data.action !== 'hydrate' || typeof data.html !== 'string') return;
        preview.srcdoc = data.html;
      });
    </script>
  </body>
</html>
